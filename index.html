<!DOCTYPE html>
<html lang="en">

<head>

    <title>Stega Suite - Unified Steganography Tools</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <style>
        :root {
            --sidebar-width: 280px;
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --border-color: #334155;
            --glass-bg: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            transition: transform 0.3s ease, width 0.3s ease, padding 0.3s ease;
            z-index: 10;
        }

        .sidebar.desktop-closed {
            width: 0;
            padding: 0;
            overflow: hidden;
            border-right: none;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            letter-spacing: -0.5px;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon span {
            font-size: 18px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 500;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .nav-item.active {
            background-color: rgba(59, 130, 246, 0.15);
            color: var(--accent-color);
            border-color: rgba(59, 130, 246, 0.2);
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            position: relative;
            background-color: #000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: var(--bg-color);
        }

        /* Mobile Toggle */
        .mobile-toggle {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .mobile-toggle:hover {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                height: 100%;
                transform: translateX(-100%);
                background: rgba(30, 41, 59, 0.95);
                backdrop-filter: blur(10px);
            }

            .sidebar.open {
                transform: translateX(0);
            }
        }
    </style>

        <iframe id="toolFrame" src="textencrypt.html" title="Tool Interface"></iframe>

    <script>
        function loadTool(element, url) {
            // Update iframe src
            document.getElementById('toolFrame').src = url;

            // Update active state in sidebar
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            // Close sidebar on mobile after selection
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth > 768) {
                sidebar.classList.toggle('desktop-closed');
            } else {
                sidebar.classList.toggle('open');
            }
        }
    </script>
